services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ap_interop_redis:/data
    networks:
      - ap-interop

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v25.1.4
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=internal://0.0.0.0:9092
      - --advertise-kafka-addr=internal://redpanda:9092
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info --brokers=redpanda:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - ap_interop_redpanda:/var/lib/redpanda/data
    networks:
      - ap-interop

  ap-proxy:
    image: caddy:2.8-alpine
    depends_on:
      fedify-sidecar:
        condition: service_healthy
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./runtime/certs:/certs:ro
    ports:
      - "127.0.0.1:18443:443"
    networks:
      ap-interop:
        aliases:
          - sidecar
          - gotosocial
          - mastodon
          - akkoma

  mock-activitypods:
    build:
      context: ../..
      dockerfile: Dockerfile.interop
    working_dir: /app
    command: ["npx", "tsx", "src/interop/ap/MockActivityPodsAuthority.ts"]
    environment:
      MOCK_ACTIVITYPODS_HOST: 0.0.0.0
      MOCK_ACTIVITYPODS_PORT: 8793
      MOCK_ACTIVITYPODS_TOKEN: interop-activitypods-token
      MOCK_ACTIVITYPODS_LOCAL_DOMAIN: sidecar
      MOCK_ACTIVITYPODS_DEFAULT_ACTOR: alice
      MOCK_ACTIVITYPODS_DEFAULT_ACTOR_NAME: Alice Interop
      MOCK_ACTIVITYPODS_KEY_DIR: /runtime/mock-authority
    volumes:
      - ./runtime/mock-authority:/runtime/mock-authority
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8793/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ap-interop

  fedify-sidecar:
    build:
      context: ../..
      dockerfile: Dockerfile.interop
    working_dir: /app
    command: ["npx", "tsx", "src/index.ts"]
    environment:
      NODE_ENV: development
      PORT: 8080
      HOST: 0.0.0.0
      DOMAIN: sidecar
      SIDECAR_TOKEN: interop-outbox-token
      ACTIVITYPODS_URL: http://mock-activitypods:8793
      ACTIVITYPODS_TOKEN: interop-activitypods-token
      REDIS_URL: redis://redis:6379
      REDPANDA_BROKERS: redpanda:9092
      ENABLE_INBOUND_WORKER: "true"
      ENABLE_OUTBOUND_WORKER: "true"
      ENABLE_OUTBOX_INTENT_WORKER: "true"
      ENABLE_OPENSEARCH_INDEXER: "false"
      ENABLE_XRPC_SERVER: "false"
      ENABLE_FEDIFY_RUNTIME_INTEGRATION: "true"
      ENABLE_PROTOCOL_BRIDGE_AP_TO_AT: "false"
      ENABLE_PROTOCOL_BRIDGE_AT_TO_AP: "false"
      AP_INTEROP_ENABLE_MEDIA_FIXTURES: "true"
      REQUEST_TIMEOUT_MS: "10000"
      LOG_LEVEL: info
      NODE_EXTRA_CA_CERTS: /interop/runtime/certs/rootCA.crt
    depends_on:
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      mock-activitypods:
        condition: service_healthy
    volumes:
      - ./runtime:/interop/runtime:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ap-interop

  gotosocial-app:
    image: superseriousbusiness/gotosocial:latest
    command: ["/gotosocial/gotosocial", "--config-path", "/gotosocial/config.yaml", "server", "start"]
    environment:
      SSL_CERT_FILE: /interop/runtime/certs/rootCA.crt
    volumes:
      - ./gotosocial/config.yaml:/gotosocial/config.yaml:ro
      - ./runtime/gotosocial:/gotosocial/storage
      - ./runtime:/interop/runtime:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/v1/instance >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ap-interop

  akkoma-db:
    image: postgres:14-alpine
    profiles: ["akkoma"]
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - ap_interop_akkoma_db:/var/lib/postgresql/data
    networks:
      - ap-interop

  akkoma-app:
    image: ap-akkoma:latest
    profiles: ["akkoma"]
    build:
      context: ./akkoma
      dockerfile: Dockerfile
      args:
        AKKOMA_SOURCE_REPO: ${AKKOMA_SOURCE_REPO:-https://akkoma.dev/AkkomaGang/akkoma.git}
        AKKOMA_SOURCE_REF: ${AKKOMA_SOURCE_REF:-v3.18.1}
        AKKOMA_SOURCE_COMMIT: ${AKKOMA_SOURCE_COMMIT:-792385f4ac1e258c21a3a900342c4ded14db1727}
    env_file:
      - ./akkoma/akkoma.env
    environment:
      SSL_CERT_FILE: /interop/runtime/certs/rootCA.crt
    depends_on:
      akkoma-db:
        condition: service_healthy
    volumes:
      - ./runtime/akkoma/etc:/etc/akkoma
      - ./runtime/akkoma/lib:/var/lib/akkoma
      - ./runtime:/interop/runtime:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/api/v1/instance >/dev/null"]
      interval: 10s
      timeout: 10s
      retries: 15
    networks:
      - ap-interop

  mastodon-db:
    image: postgres:14-alpine
    profiles: ["mastodon"]
    environment:
      POSTGRES_DB: mastodon_production
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mastodon_production"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - ap_interop_mastodon_db:/var/lib/postgresql/data
    networks:
      - ap-interop

  mastodon-redis:
    image: redis:7-alpine
    profiles: ["mastodon"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - ap_interop_mastodon_redis:/data
    networks:
      - ap-interop

  mastodon-web-app:
    image: ghcr.io/mastodon/mastodon:v4.5.8
    profiles: ["mastodon"]
    command: bundle exec puma -C /interop/mastodon/puma.local.rb
    depends_on:
      mastodon-db:
        condition: service_healthy
      mastodon-redis:
        condition: service_healthy
    environment:
      RAILS_ENV: production
      NODE_ENV: production
      LOCAL_DOMAIN: mastodon
      REDIS_HOST: mastodon-redis
      REDIS_PORT: 6379
      DB_HOST: mastodon-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_NAME: mastodon_production
      DB_PASS: postgres
      ES_ENABLED: "false"
      SECRET_KEY_BASE: ${MASTODON_SECRET_KEY_BASE:-}
      OTP_SECRET: ${MASTODON_OTP_SECRET:-}
      VAPID_PRIVATE_KEY: ${MASTODON_VAPID_PRIVATE_KEY:-}
      VAPID_PUBLIC_KEY: ${MASTODON_VAPID_PUBLIC_KEY:-}
      ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY: ${ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY:-}
      ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT: ${ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT:-}
      ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY: ${ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY:-}
      ALLOWED_PRIVATE_ADDRESSES: 172.31.240.0/24
      SMTP_SERVER: ""
      SMTP_PORT: 25
      SMTP_FROM_ADDRESS: notifications@mastodon
      RAILS_LOG_TO_STDOUT: "true"
      RAILS_SERVE_STATIC_FILES: "true"
      WEB_CONCURRENCY: "0"
      MAX_THREADS: "2"
      DB_POOL: "2"
      RUBY_YJIT_ENABLE: "0"
      SSL_CERT_FILE: /interop/runtime/certs/rootCA.crt
    volumes:
      - ap_interop_mastodon_public:/mastodon/public/system
      - ./mastodon/puma.local.rb:/interop/mastodon/puma.local.rb:ro
      - ./runtime:/interop/runtime:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health >/dev/null"]
      interval: 10s
      timeout: 10s
      retries: 15
    networks:
      - ap-interop

  mastodon-sidekiq:
    image: ghcr.io/mastodon/mastodon:v4.5.8
    profiles: ["mastodon"]
    command: bundle exec sidekiq
    depends_on:
      mastodon-db:
        condition: service_healthy
      mastodon-redis:
        condition: service_healthy
    environment:
      RAILS_ENV: production
      NODE_ENV: production
      LOCAL_DOMAIN: mastodon
      REDIS_HOST: mastodon-redis
      REDIS_PORT: 6379
      DB_HOST: mastodon-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_NAME: mastodon_production
      DB_PASS: postgres
      ES_ENABLED: "false"
      SECRET_KEY_BASE: ${MASTODON_SECRET_KEY_BASE:-}
      OTP_SECRET: ${MASTODON_OTP_SECRET:-}
      VAPID_PRIVATE_KEY: ${MASTODON_VAPID_PRIVATE_KEY:-}
      VAPID_PUBLIC_KEY: ${MASTODON_VAPID_PUBLIC_KEY:-}
      ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY: ${ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY:-}
      ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT: ${ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT:-}
      ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY: ${ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY:-}
      ALLOWED_PRIVATE_ADDRESSES: 172.31.240.0/24
      SMTP_SERVER: ""
      SMTP_PORT: 25
      SMTP_FROM_ADDRESS: notifications@mastodon
      RAILS_LOG_TO_STDOUT: "true"
      SIDEKIQ_CONCURRENCY: "1"
      DB_POOL: "2"
      RUBY_YJIT_ENABLE: "0"
      SSL_CERT_FILE: /interop/runtime/certs/rootCA.crt
    volumes:
      - ap_interop_mastodon_public:/mastodon/public/system
      - ./runtime:/interop/runtime:ro
    networks:
      - ap-interop

  ap-interop-proof:
    build:
      context: ../..
      dockerfile: Dockerfile.interop
    working_dir: /app
    profiles: ["proof"]
    command: ["npx", "tsx", "src/interop/ap/ApInteropHarnessProof.ts"]
    environment:
      NODE_EXTRA_CA_CERTS: /interop/runtime/certs/rootCA.crt
      AP_INTEROP_REDIS_URL: redis://redis:6379
      AP_INTEROP_SIDECAR_WEBHOOK_URL: http://fedify-sidecar:8080/webhook/outbox
      AP_INTEROP_SIDECAR_TOKEN: interop-outbox-token
      AP_INTEROP_ACTIVITYPODS_URL: http://mock-activitypods:8793
      AP_INTEROP_ACTIVITYPODS_TOKEN: interop-activitypods-token
      AP_INTEROP_TARGET: ${AP_INTEROP_TARGET:-gotosocial}
      AP_INTEROP_TARGET_HOST: ${AP_INTEROP_TARGET_HOST:-}
      AP_INTEROP_TARGET_USERNAME: ${AP_INTEROP_TARGET_USERNAME:-interop}
      AP_INTEROP_TIMEOUT_MS: ${AP_INTEROP_TIMEOUT_MS:-120000}
      AP_INTEROP_ATTACHMENT_PROOF_ENABLED: ${AP_INTEROP_ATTACHMENT_PROOF_ENABLED:-true}
      AP_INTEROP_RESULT_PATH: ${AP_INTEROP_RESULT_PATH:-}
    depends_on:
      fedify-sidecar:
        condition: service_healthy
      ap-proxy:
        condition: service_started
    volumes:
      - ./runtime:/interop/runtime
    networks:
      - ap-interop

volumes:
  ap_interop_redis:
  ap_interop_redpanda:
  ap_interop_akkoma_db:
  ap_interop_mastodon_db:
  ap_interop_mastodon_redis:
  ap_interop_mastodon_public:

networks:
  ap-interop:
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.240.0/24
