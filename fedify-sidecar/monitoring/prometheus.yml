global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Fedify Sidecar metrics
  - job_name: 'fedify-sidecar'
    static_configs:
      - targets: ['fedify-sidecar:3001']
    metrics_path: /metrics
    scrape_interval: 10s

  # RedPanda metrics
  - job_name: 'redpanda'
    static_configs:
      - targets: ['redpanda:9644']
    metrics_path: /public_metrics
    scrape_interval: 30s

  # OpenSearch metrics (via exporter if available)
  - job_name: 'opensearch'
    static_configs:
      - targets: ['opensearch:9200']
    metrics_path: /_prometheus/metrics
    scrape_interval: 30s
