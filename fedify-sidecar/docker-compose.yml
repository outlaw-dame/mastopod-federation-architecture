version: '3.8'

x-media-pipeline-sidecar-base: &media_pipeline_sidecar_base
  build:
    context: ../media-pipeline-sidecar
    dockerfile: Dockerfile
  restart: unless-stopped
  environment:
    - NODE_ENV=production
    - PORT=8090
    - HOST=0.0.0.0
    - INTERNAL_BEARER_TOKEN=${MEDIA_PIPELINE_TOKEN:-change-me}
    - REDIS_URL=redis://redis:6379
    - REDPANDA_BROKERS=redpanda:9092
    - ENABLE_EVENT_PUBLISH=${MEDIA_PIPELINE_ENABLE_EVENT_PUBLISH:-false}
    - OPENSEARCH_URL=http://opensearch:9200
    - ASSET_STORE_BACKEND=redis
    - S3_ENDPOINT=${MEDIA_PIPELINE_S3_ENDPOINT:-https://s3.filebase.com}
    - S3_REGION=${MEDIA_PIPELINE_S3_REGION:-us-east-1}
    - S3_BUCKET=${MEDIA_PIPELINE_S3_BUCKET:-}
    - S3_ACCESS_KEY_ID=${MEDIA_PIPELINE_S3_ACCESS_KEY_ID:-}
    - S3_SECRET_ACCESS_KEY=${MEDIA_PIPELINE_S3_SECRET_ACCESS_KEY:-}
    - S3_PUBLIC_BASE_URL=${MEDIA_PIPELINE_S3_PUBLIC_BASE_URL:-}
    - CLOUDFLARE_MEDIA_DOMAIN=${MEDIA_PIPELINE_CLOUDFLARE_MEDIA_DOMAIN:-}
    - SAFE_BROWSING_API_KEY=${SAFE_BROWSING_API_KEY:-}
    - GOOGLE_VISION_API_KEY=${GOOGLE_VISION_API_KEY:-}
    - GOOGLE_VIDEO_ACCESS_TOKEN=${GOOGLE_VIDEO_ACCESS_TOKEN:-}
  depends_on:
    redis:
      condition: service_healthy
    redpanda:
      condition: service_healthy
    opensearch:
      condition: service_healthy
  networks:
    - activitypods-network

services:
  # ==========================================================================
  # Redis - Work queues (inbound/outbound), idempotency, rate limiting
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - activitypods-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  # ==========================================================================
  # Fedify Sidecar - handles remote federation
  # Uses Redis Streams for work queues, RedPanda for event logs only
  # ==========================================================================
  fedify-sidecar:
    build: .
    container_name: fedify-sidecar
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - HOST=0.0.0.0
      - VERSION=5.0.0
      - DOMAIN=${DOMAIN:-localhost}
      - BASE_URL=${BASE_URL:-http://localhost:8080}
      
      # Redis - work queues and control data
      - REDIS_URL=redis://redis:6379
      - INBOUND_STREAM_KEY=ap:queue:inbound:v1
      - OUTBOUND_STREAM_KEY=ap:queue:outbound:v1
      - DLQ_STREAM_KEY=ap:queue:dlq:v1
      - CONSUMER_GROUP=sidecar-workers
      - BLOCK_TIMEOUT_MS=5000
      - CLAIM_IDLE_TIME_MS=60000
      
      # RedPanda - event logs ONLY (not work queues)
      - REDPANDA_BROKERS=redpanda:9092
      - REDPANDA_CLIENT_ID=fedify-sidecar
      - TOPIC_STREAM1=ap.public.local.v1
      - TOPIC_STREAM2=ap.public.remote.v1
      - TOPIC_FIREHOSE=ap.public.firehose.v1
      - CONSUMER_GROUP_INDEXER=sidecar-indexer
      
      # ActivityPods - signing API (keys never leave)
      - ACTIVITYPODS_URL=${ACTIVITYPODS_URL:-http://activitypods:3000}
      - ACTIVITYPODS_TOKEN=${ACTIVITYPODS_TOKEN:-}
      - SIGNING_API_URL=http://activitypods:3000/api/internal/signatures/batch
      
      # OpenSearch - activity storage
      - OPENSEARCH_NODE=http://opensearch:9200
      - OPENSEARCH_INDEX_PREFIX=activitypods
      
      # Delivery settings
      - OUTBOUND_CONCURRENCY=64
      - MAX_CONCURRENT_PER_DOMAIN=10
      - INBOUND_CONCURRENCY=32
      - REQUEST_TIMEOUT_MS=30000
      - USER_AGENT=Fedify-Sidecar/5.0 (ActivityPods)
      
      # Feature flags
      - ENABLE_OUTBOUND_WORKER=true
      - ENABLE_INBOUND_WORKER=true
      - ENABLE_OPENSEARCH_INDEXER=true
      
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=json
    depends_on:
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    networks:
      - activitypods-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ==========================================================================
  # Media Pipeline Sidecar - derivative generation, media analysis, asset index
  # Optional AP module; canonical pod blobs remain owned by ActivityPods
  # ==========================================================================
  media-pipeline-sidecar:
    <<: *media_pipeline_sidecar_base
    container_name: media-pipeline-sidecar
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8090/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  media-pipeline-ingest-worker:
    <<: *media_pipeline_sidecar_base
    command: ["npm", "run", "worker:ingest"]

  media-pipeline-fetch-worker:
    <<: *media_pipeline_sidecar_base
    command: ["npm", "run", "worker:fetch"]

  media-pipeline-process-image-worker:
    <<: *media_pipeline_sidecar_base
    command: ["npm", "run", "worker:process:image"]

  media-pipeline-process-video-worker:
    <<: *media_pipeline_sidecar_base
    command: ["npm", "run", "worker:process:video"]

  media-pipeline-video-rendition-worker:
    <<: *media_pipeline_sidecar_base
    command: ["npm", "run", "worker:rendition:video"]

  media-pipeline-finalize-worker:
    <<: *media_pipeline_sidecar_base
    command: ["npm", "run", "worker:finalize"]

  # ==========================================================================
  # RedPanda - Kafka-compatible streaming platform
  # Used ONLY for immutable event logs (Stream1, Stream2, Firehose)
  # NOT used for work queues - Redis Streams handles that
  # ==========================================================================
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.1
    container_name: redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --smp 1
      - --memory 1G
      - --mode dev-container
      - --default-log-level=warn
    ports:
      - "19092:19092"  # Kafka API (external)
      - "18082:18082"  # Pandaproxy (external)
      - "18081:18081"  # Schema Registry (external)
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    networks:
      - activitypods-network
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 30s

  # RedPanda Console - Web UI for RedPanda
  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.4.5
    container_name: redpanda-console
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      - KAFKA_BROKERS=redpanda:9092
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - activitypods-network

  # ==========================================================================
  # OpenSearch - DBMS for all public activities (Firehose storage)
  # ==========================================================================
  opensearch:
    image: opensearchproject/opensearch:2.12.0
    container_name: opensearch
    restart: unless-stopped
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch-node
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - DISABLE_SECURITY_PLUGIN=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - activitypods-network
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -vq '\"status\":\"red\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # OpenSearch Dashboards - Web UI for OpenSearch
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.12.0
    container_name: opensearch-dashboards
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    depends_on:
      opensearch:
        condition: service_healthy
    networks:
      - activitypods-network

  # ==========================================================================
  # Prometheus - Metrics collection
  # ==========================================================================
  prometheus:
    image: prom/prometheus:v2.49.1
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - activitypods-network

  # ==========================================================================
  # Grafana - Metrics visualization
  # ==========================================================================
  grafana:
    image: grafana/grafana:10.3.1
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - activitypods-network

networks:
  activitypods-network:
    name: activitypods-network
    driver: bridge

volumes:
  redis-data:
  redpanda-data:
  opensearch-data:
  prometheus-data:
  grafana-data:
